project:
  name: uav_ring_mosaic_demo

input:
  mode: image
  image_paths:
    uav1: data/images/uav1.png
    uav2: data/images/uav2.png
    uav3: data/images/uav3.png
    uav4: data/images/uav4.png
  video_paths:
    uav1: data/videos/uav1.mp4
    uav2: data/videos/uav2.mp4
    uav3: data/videos/uav3.mp4
    uav4: data/videos/uav4.mp4

camera:
  use_undistort: false
  calibration_file: configs/cameras.yaml

masks:
  use_building_mask: true
  ground_priority: true
  building_masks:
    uav1: data/masks/uav1_building_mask.png
    uav2: data/masks/uav2_building_mask.png
    uav3: data/masks/uav3_building_mask.png
    uav4: data/masks/uav4_building_mask.png

homography:
  mode: auto  # auto or manual
  control_points_file: outputs/homographies/control_points.yaml
  homography_file: outputs/homographies/homographies.yaml
  compute_if_missing: true
  camera_order: [uav1, uav2, uav3, uav4]
  feature_method: superpoint_lightglue
  graph_mode: overlap_graph
  layout_optimization: global_homography_graph
  nfeatures: 4000
  ratio_test: 0.75
  ransac_reproj_threshold: 4.0
  min_matches: 40
  min_inliers: 25
  use_building_mask_for_features: true
  confidence:
    use_match_support_mask: true
    support_mask_dilate: 61
    support_mask_blur: 41
    min_inlier_ratio: 0.45
  warp_model: apap  # global or apap
  apap:
    mesh_cols: 16
    mesh_rows: 16
    sigma: 220.0
    min_weight: 0.001

canvas:
  mode: auto_fit
  width: 3000
  height: 3000
  margin_px: 96
  background_color: [0, 0, 0]
  preview_scale: 0.5
  building_anchor:
    enabled: false
    point: [1500, 1500]

annotation:
  mode: adjacent_pair
  reference_camera: uav1
  min_points_per_camera: 4
  max_points_per_camera: 20
  camera_order: [uav1, uav2, uav3, uav4]

blending:
  method: feather
  exclude_building_area: true
  confidence_scope: overlap_only
  building_strategy: reference_overlay
  feather_radius: 25
  building_overlay_alpha: 0.45
  building_reference_camera: uav1

video:
  output_fps: 20
  save_output: true
  output_path: outputs/videos/mosaic_output.mp4
  display_window: true
  on_stream_end: hold_last_frame

runtime:
  reuse_static_layout: true

debug:
  save_warped_images: true
  save_masks: true
  save_weight_maps: true
